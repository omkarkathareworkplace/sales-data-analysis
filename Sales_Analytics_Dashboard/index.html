<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Sales Analytics Dashboard</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151c2c;
            --accent-primary: #38bdf8;
            --accent-gradient: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 24px;
            min-height: 100vh;
        }

        /* Top Header */
        header {
            max-width: 1400px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .header-title h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .status-badge {
            background-color: rgba(56, 189, 248, 0.1);
            color: var(--accent-primary);
            border: 1px solid rgba(56, 189, 248, 0.3);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #22c55e;
            border-radius: 50%;
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Navigation Controls */
        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .tabs-group {
            display: flex;
            gap: 8px;
            background-color: var(--card-bg);
            padding: 6px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .tab-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            color: var(--text-main);
        }

        .tab-btn.active {
            background-color: var(--accent-primary);
            color: #0b0f19;
        }

        /* Grid Layouts */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .chart-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .chart-card:hover {
            border-color: rgba(56, 189, 248, 0.4);
        }

        .chart-card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chart-card-header h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
        }

        iframe {
            width: 100%;
            height: 480px;
            border: none;
            display: block;
        }

        /* Focus View Frame */
        .single-view {
            display: none;
        }

        .single-view iframe {
            height: 650px;
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header>
        <div class="header-title">
            <h1>Sales Analytics Platform</h1>
            <p>Automated Financial & Performance Intelligence</p>
        </div>
        <div class="status-badge">
            <span class="status-dot"></span> Live Analytics Connected
        </div>
    </header>

    <div class="container">
        
        <!-- Navigation Tabs -->
        <div class="controls-bar">
            <div class="tabs-group">
                <button class="tab-btn active" onclick="showView('grid', this)">📊 All Charts Grid</button>
                <button class="tab-btn" onclick="showSingleChart('dashboard/top_products.html', this)">📦 Top Products</button>
                <button class="tab-btn" onclick="showSingleChart('dashboard/monthly_revenue.html', this)">📈 Revenue Trend</button>
                <button class="tab-btn" onclick="showSingleChart('dashboard/top_customers.html', this)">👥 Top Customers</button>
                <button class="tab-btn" onclick="showSingleChart('dashboard/city_revenue.html', this)">🏙️ City Revenue</button>
            </div>
        </div>

        <!-- View 1: Multi-Chart Grid View -->
        <div id="gridView" class="dashboard-grid">
            <div class="chart-card">
                <div class="chart-card-header">
                    <h3>Top 10 Selling Products</h3>
                </div>
                <iframe src="dashboard/top_products.html"></iframe>
            </div>

            <div class="chart-card">
                <div class="chart-card-header">
                    <h3>Monthly Revenue Trend</h3>
                </div>
                <iframe src="dashboard/monthly_revenue.html"></iframe>
            </div>

            <div class="chart-card">
                <div class="chart-card-header">
                    <h3>Top 10 Customers by Revenue</h3>
                </div>
                <iframe src="dashboard/top_customers.html"></iframe>
            </div>

            <div class="chart-card">
                <div class="chart-card-header">
                    <h3>Revenue Distribution by City</h3>
                </div>
                <iframe src="dashboard/city_revenue.html"></iframe>
            </div>
        </div>

        <!-- View 2: Focus Single Chart View -->
        <div id="singleView" class="single-view">
            <div class="chart-card">
                <iframe id="focusFrame" src="dashboard/top_products.html"></iframe>
            </div>
        </div>

    </div>

    <script>
        function showView(viewType, btnElement) {
            setActiveButton(btnElement);
            if (viewType === 'grid') {
                document.getElementById('gridView').style.display = 'grid';
                document.getElementById('singleView').style.display = 'none';
            }
        }

        function showSingleChart(chartUrl, btnElement) {
            setActiveButton(btnElement);
            document.getElementById('gridView').style.display = 'none';
            document.getElementById('singleView').style.display = 'block';
            document.getElementById('focusFrame').src = chartUrl;
        }

        function setActiveButton(btnElement) {
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        }
    </script>

</body>
</html>
